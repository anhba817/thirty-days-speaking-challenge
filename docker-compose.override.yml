# Auto-loaded by `docker compose up` (test/dev only).
# Adds a local Postgres container and points the backend at it.
#
# To run the production-shaped stack without this file:
#   docker compose -f docker-compose.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: ielts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ielts
      POSTGRES_PASSWORD: ielts_dev
      POSTGRES_DB: ielts
    ports:
      - "5433:5432"
    volumes:
      - ielts_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ielts -d ielts"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    environment:
      DATABASE_URL: postgresql://ielts:ielts_dev@postgres:5432/ielts?schema=public
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  ielts_postgres_data:
